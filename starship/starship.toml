# ==============================================================================
# Starship 프롬프트 설정
# ==============================================================================
# 이 파일은 dotfiles/starship/starship.toml 에 있으며,
# ~/.config/starship.toml 로 심볼릭 링크된다.
#
# Starship은 Oh My Zsh의 ZSH_THEME=""와 함께 사용된다.
# .zshrc 맨 아래에서 'eval "$(starship init zsh)"' 로 초기화된다.
#
# 현재 설정: Dracula 팔레트 기반 세그먼트형 프롬프트
#   OS 아이콘 → 사용자명 → 디렉토리 → git 브랜치 → 언어 버전 → 도커 → 시간
# ==============================================================================

# 설정 파일 스키마 (에디터 자동완성·유효성 검사용)
"$schema" = 'https://starship.rs/config-schema.json'

# ==============================================================================
# 전체 프롬프트 레이아웃
# ==============================================================================
# 각 세그먼트를 파워라인 스타일(▶ 화살표)로 연결한다.
# bg/fg 전환 시 이전 세그먼트의 배경색을 다음 전환 아이콘의 전경색으로 사용한다.
# $line_break 로 줄을 나누고, $character 로 입력 커서(❯/✗)를 표시한다.
format = """
[](color_orange)\
$os\
$username\
[](bg:color_yellow fg:color_orange)\
$directory\
[](fg:color_yellow bg:color_aqua)\
$git_branch\
$git_status\
[](fg:color_aqua bg:color_blue)\
$c\
$cpp\
$rust\
$golang\
$nodejs\
$php\
$java\
$kotlin\
$haskell\
$python\
[](fg:color_blue bg:color_bg3)\
$docker_context\
$conda\
$pixi\
[](fg:color_bg3 bg:color_bg1)\
$time\
[ ](fg:color_bg1)\
$line_break$character"""

# ==============================================================================
# 색상 팔레트: Dracula
# ==============================================================================
# Dracula는 어두운 배경에 선명한 색상을 조합한 팔레트로,
# 프로젝트 전체(tmux, fzf, delta, Windows Terminal 등)에서 통일하여 사용한다.
# 각 색상 이름은 위 format 문자열의 bg:/fg: 에서 참조된다.
palette = 'dracula'

[palettes.dracula]
color_fg0 = '#f8f8f2'    # Foreground (텍스트 기본색)
color_bg1 = '#282a36'    # Background (시간 세그먼트)
color_bg3 = '#44475a'    # Current Line (도커/콘다 세그먼트)
color_blue = '#8be9fd'   # Cyan (언어 버전 세그먼트)
color_aqua = '#50fa7b'   # Green (git 세그먼트)
color_green = '#50fa7b'  # Green (성공 커서)
color_orange = '#ffb86c' # Orange (OS/사용자 세그먼트)
color_purple = '#bd93f9' # Purple (vim replace 모드 커서)
color_red = '#ff5555'    # Red (에러 커서)
color_yellow = '#f1fa8c' # Yellow (디렉토리 세그먼트)

# ==============================================================================
# OS 아이콘 세그먼트
# ==============================================================================
# 현재 운영체제에 해당하는 Nerd Font 아이콘을 표시한다.
# WSL2에서는 Ubuntu 아이콘(󰕈)이 표시된다.
[os]
disabled = false
style = "bg:color_orange fg:color_bg1"

[os.symbols]
Windows = "󰍲"
Ubuntu = "󰕈"
SUSE = ""
Raspbian = "󰐿"
Mint = "󰣭"
Macos = "󰀵"
Manjaro = ""
Linux = "󰌽"
Gentoo = "󰣨"
Fedora = "󰣛"
Alpine = ""
Amazon = ""
Android = ""
AOSC = ""
Arch = "󰣇"
Artix = "󰣇"
EndeavourOS = ""
CentOS = ""
Debian = "󰣚"
Redhat = "󱄛"
RedHatEnterprise = "󱄛"
Pop = ""

# ==============================================================================
# 사용자명 세그먼트
# ==============================================================================
# 현재 로그인한 사용자명을 항상 표시한다.
# root와 일반 사용자 모두 동일한 스타일(주황색 배경) 적용.
[username]
show_always = true
style_user = "bg:color_orange fg:color_bg1"
style_root = "bg:color_orange fg:color_bg1"
format = '[ $user ]($style)'

# ==============================================================================
# 디렉토리 세그먼트
# ==============================================================================
# 현재 작업 디렉토리 경로를 노란색 배경으로 표시한다.
# 경로가 3단계를 초과하면 앞부분을 …/ 로 생략한다.
[directory]
style = "fg:color_bg1 bg:color_yellow"
format = "[ $path ]($style)"
truncation_length = 3       # 최대 3단계 깊이까지 표시 (이상은 …/ 로 생략)
truncation_symbol = "…/"    # 생략 기호

# 자주 사용하는 경로를 아이콘으로 치환하여 가독성 향상
[directory.substitutions]
"Documents" = "󰈙 "
"Downloads" = " "
"Music" = "󰝚 "
"Pictures" = " "
"Developer" = "󰲋 "
"~/workspace" = "🔥 "

# ==============================================================================
# Git 브랜치 세그먼트
# ==============================================================================
# 현재 git 브랜치명을 청록색 배경으로 표시한다.
# 브랜치 아이콘() 뒤에 브랜치명이 오는 형식.
[git_branch]
symbol = ""
style = "bg:color_aqua"
format = '[[ $symbol $branch ](fg:color_bg1 bg:color_aqua)]($style)'

# ==============================================================================
# Git 상태 세그먼트
# ==============================================================================
# 변경 파일 수, ahead/behind 정보를 표시한다.
# 현재는 비활성화 (속도 우선 / git_branch만으로 충분).
[git_status]
disabled = true
style = "bg:color_aqua"
format = '[[($all_status$ahead_behind )](fg:color_bg1 bg:color_aqua)]($style)'

# ==============================================================================
# 언어 버전 세그먼트 (파란색 배경)
# ==============================================================================
# 프로젝트 디렉토리에 해당 언어 파일이 있을 때만 자동으로 표시된다.
# 예: package.json → Node.js 버전, Cargo.toml → Rust 버전

[nodejs]
symbol = ""
style = "bg:color_blue"
format = '[[ $symbol( $version) ](fg:color_bg1 bg:color_blue)]($style)'

[c]
symbol = " "
style = "bg:color_blue"
format = '[[ $symbol( $version) ](fg:color_bg1 bg:color_blue)]($style)'

[cpp]
symbol = " "
style = "bg:color_blue"
format = '[[ $symbol( $version) ](fg:color_bg1 bg:color_blue)]($style)'

[rust]
symbol = ""
style = "bg:color_blue"
format = '[[ $symbol( $version) ](fg:color_bg1 bg:color_blue)]($style)'

[golang]
symbol = ""
style = "bg:color_blue"
format = '[[ $symbol( $version) ](fg:color_bg1 bg:color_blue)]($style)'

[php]
symbol = ""
style = "bg:color_blue"
format = '[[ $symbol( $version) ](fg:color_bg1 bg:color_blue)]($style)'

[java]
symbol = ""
style = "bg:color_blue"
format = '[[ $symbol( $version) ](fg:color_bg1 bg:color_blue)]($style)'

[kotlin]
symbol = ""
style = "bg:color_blue"
format = '[[ $symbol( $version) ](fg:color_bg1 bg:color_blue)]($style)'

[haskell]
symbol = ""
style = "bg:color_blue"
format = '[[ $symbol( $version) ](fg:color_bg1 bg:color_blue)]($style)'

[python]
symbol = ""
style = "bg:color_blue"
format = '[[ $symbol( $version) ](fg:color_bg1 bg:color_blue)]($style)'

# ==============================================================================
# 컨테이너/환경 세그먼트 (어두운 배경)
# ==============================================================================
# Docker 컨텍스트, Conda/Pixi 환경이 활성화된 경우에만 표시된다.

[docker_context]
symbol = ""
style = "bg:color_bg3"
format = '[[ $symbol( $context) ](fg:#8be9fd bg:color_bg3)]($style)'

[conda]
style = "bg:color_bg3"
format = '[[ $symbol( $environment) ](fg:#8be9fd bg:color_bg3)]($style)'

[pixi]
style = "bg:color_bg3"
format = '[[ $symbol( $version)( $environment) ](fg:color_fg0 bg:color_bg3)]($style)'

# ==============================================================================
# 시간 세그먼트
# ==============================================================================
# 현재 시각을 HH:MM 형식으로 프롬프트 오른쪽 끝에 표시한다.
# tmux 상태 바와 달리 프롬프트 라인에 인라인으로 표시된다.
[time]
disabled = false
time_format = "%R"          # 24시간제 HH:MM
style = "bg:color_bg1"
format = '[[  $time ](fg:color_fg0 bg:color_bg1)]($style)'

# ==============================================================================
# 줄바꿈 및 입력 커서
# ==============================================================================
# $line_break 로 프롬프트를 두 줄로 나눈다.
# $character 는 두 번째 줄의 입력 커서(❯)를 표시한다.
#   - 명령 성공 시: 녹색 ❯
#   - 명령 실패 시: 빨간색 ✗
#   - Vim 노멀 모드: 녹색 ❮
#   - Vim replace 모드: 보라색 커서

[line_break]
disabled = false

[character]
disabled = false
success_symbol = '[](bold fg:color_green)'
error_symbol = '[](bold fg:color_red)'
vimcmd_symbol = '[](bold fg:color_green)'
vimcmd_replace_one_symbol = '[](bold fg:color_purple)'
vimcmd_replace_symbol = '[](bold fg:color_purple)'
vimcmd_visual_symbol = '[](bold fg:color_yellow)'
