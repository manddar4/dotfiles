# ==============================================================================
# tmux 설정 파일
# ==============================================================================
# 이 파일은 dotfiles/tmux/.tmux.conf 에 있으며, ~/.tmux.conf 로 심볼릭 링크된다.
# 설정 변경 후 적용: Ctrl+a → r (설정 리로드)
# ==============================================================================

# ==============================================================================
# 플러그인 (TPM - Tmux Plugin Manager)
# ==============================================================================
# TPM 설치: linux-tools.sh에서 ~/.tmux/plugins/tpm 에 git clone됨
# 플러그인 설치: tmux 안에서 Ctrl+a → I (대문자)
# 플러그인 업데이트: Ctrl+a → U
# 플러그인 제거: Ctrl+a → alt+u

set -g @plugin 'tmux-plugins/tpm'

# tmux-resurrect: 세션 수동 저장/복구
#   저장:  Ctrl+a → Ctrl+s
#   복구:  Ctrl+a → Ctrl+r
#   저장 위치: ~/.local/share/tmux/resurrect/
set -g @plugin 'tmux-plugins/tmux-resurrect'

# tmux-continuum: 자동 저장 + 시스템 시작 시 자동 복구
set -g @plugin 'tmux-plugins/tmux-continuum'

# resurrect 설정
set -g @resurrect-capture-pane-contents 'on'    # 각 창의 내용도 저장
set -g @resurrect-strategy-nvim 'session'        # nvim 세션 파일도 복구 (Session.vim)

# continuum 설정
set -g @continuum-restore 'on'           # tmux 서버 시작 시 마지막 저장 세션 자동 복구
set -g @continuum-save-interval '15'     # 15분마다 자동 저장

# ==============================================================================
# 기본 설정
# ==============================================================================

# 256색 + true color 지원 (nvim, bat 등의 색상 정확도를 위해)
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm*:Tc"

# ESC 입력 지연 제거 (nvim에서 ESC가 즉시 반응하도록)
# 기본값은 500ms로 nvim에서 느리게 느껴짐
set -sg escape-time 0

# 확장 키 지원 (nvim에서 Cmd 조합키 사용을 위해)
set -s extended-keys on
set -as terminal-features 'xterm*:extkeys'

# 기본 셸 설정
# default-command "zsh": login shell이 아닌 interactive shell로 실행
# → /etc/profile, ~/.zprofile 등 login shell 스크립트를 다시 실행하지 않음
# → .zshrc가 정상적으로 로드됨
set -g default-shell /bin/zsh
set -g default-command "zsh"

# 스크롤백 버퍼 크기 (50000줄까지 위로 스크롤 가능)
set -g history-limit 50000

# 마우스 지원 (스크롤, 창 크기 조절, 클릭으로 포커스 전환)
set -g mouse on

# 창(window)과 패널(pane) 번호를 1부터 시작 (0은 키보드에서 멀어서 불편)
set -g base-index 1
setw -g pane-base-index 1

# 창을 닫으면 번호를 자동으로 재정렬 (1, 2, 4 → 1, 2, 3)
set -g renumber-windows on

# ==============================================================================
# Prefix 키 설정
# ==============================================================================
# 기본 prefix인 Ctrl+b 대신 Ctrl+a 사용
# Ctrl+a는 터미널에서 줄 처음으로 이동하는 키지만,
# tmux 안에서는 이 단축키가 덜 필요하며 손가락 이동이 편리하다.

unbind C-b              # 기본 Ctrl+b prefix 제거
set -g prefix C-a       # 새 prefix를 Ctrl+a 로 설정
bind C-a send-prefix    # Ctrl+a Ctrl+a → 실제 Ctrl+a를 현재 앱으로 전달

# ==============================================================================
# 세션 탐색
# ==============================================================================

# Alt+s: 세션 목록을 트리 형태로 표시 (fzf 스타일 팝업)
# -Z: 선택 후 줌 해제
bind -n M-s choose-tree -Zs

# Alt+Left/Right: 이전/다음 세션으로 전환
bind -n M-Left switch-client -p
bind -n M-Right switch-client -n

# ==============================================================================
# 창(window) 탐색
# ==============================================================================

# Alt+h/l 또는 Alt+[/]: 이전/다음 창으로 이동 (vim 스타일)
bind -n M-h previous-window
bind -n M-l next-window
bind -n M-[ previous-window
bind -n M-] next-window

# Alt+숫자: 해당 번호의 창으로 바로 이동
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5

# Alt+c: 현재 경로에서 새 창 열기
bind -n M-c new-window -c "#{pane_current_path}"

# Alt+x: 현재 창 닫기 (확인 요청)
bind -n M-x confirm-before -p "kill window? (y/n)" kill-window

# ==============================================================================
# 패널(pane) 탐색
# ==============================================================================

# Alt+위/아래: 패널 간 이동 (분할 화면 사용 시)
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# Ctrl+a + hjkl: vim 스타일 패널 이동
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# 화면 분할 단축키
# | 로 좌우 분할, - 로 상하 분할 (현재 경로 유지)
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# ==============================================================================
# 기타 단축키
# ==============================================================================

# Ctrl+a + r: tmux 설정 파일 즉시 리로드
bind r source-file ~/.tmux.conf \; display "Config reloaded!"

# Ctrl+a + d: 세션에서 분리 (tmux는 백그라운드에서 계속 실행)
bind d detach-client

# Ctrl+a + z: 현재 패널 전체 화면 토글 (zoom)
bind z resize-pane -Z

# ==============================================================================
# 상태 바 (Dracula 테마)
# ==============================================================================

set -g status-position bottom              # 상태 바를 화면 아래에 표시
set -g status-style "bg=#282a36,fg=#f8f8f2" # Dracula 배경(#282a36), 텍스트(#f8f8f2)
set -g status-left-length 50
set -g status-right-length 50

# 왼쪽: 세션 이름을 보라색 배지로 표시
set -g status-left "#[fg=#282a36,bg=#bd93f9,bold] #S #[fg=#bd93f9,bg=#282a36]"

# 오른쪽: 현재 시간 (HH:MM)
set -g status-right "#[fg=#6272a4]%H:%M "

# 창 탭 (비활성)
set -g window-status-format "#[fg=#6272a4] #I:#W "

# 창 탭 (현재 활성 창) - 분홍색으로 강조
set -g window-status-current-format "#[fg=#282a36,bg=#ff79c6,bold] #I:#W #[fg=#ff79c6,bg=#282a36]"

# 패널 테두리 색상
set -g pane-border-style "fg=#6272a4"             # 비활성 패널: 회색
set -g pane-active-border-style "fg=#ff79c6"      # 활성 패널: 분홍색

# ==============================================================================
# 복사 모드 (vim 스타일)
# ==============================================================================
# Ctrl+a + [ : 복사 모드 진입
# q 또는 Esc : 복사 모드 종료

setw -g mode-keys vi  # vi 키 바인딩 사용

# v: 선택 시작 (visual mode처럼)
bind -T copy-mode-vi v send -X begin-selection

# y: 선택 취소 (기본 동작 - 클립보드 통합 없을 때 사용)
bind -T copy-mode-vi y send -X copy-selection-and-cancel

# macOS 클립보드 통합 (pbcopy 사용)
# uname이 Darwin이면 y와 마우스 드래그 종료 시 pbcopy로 복사
if-shell "uname | grep -q Darwin" {
    bind -T copy-mode-vi y send -X copy-pipe-and-cancel "pbcopy"
    bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe-and-cancel "pbcopy"
}

# WSL2 클립보드 통합 (clip.exe 사용)
# uname -r 결과에 'microsoft' 포함 여부로 WSL2 환경 감지
# clip.exe는 WSL2의 PATH에 자동으로 포함되어 있음 (/mnt/c/Windows/System32/clip.exe)
if-shell "uname -r | grep -qi microsoft" {
    bind -T copy-mode-vi y send -X copy-pipe-and-cancel "clip.exe"
    bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe-and-cancel "clip.exe"
}

# ==============================================================================
# TPM 초기화 (반드시 파일 맨 아래에 위치해야 함)
# ==============================================================================
# 이 줄 이후에 설정을 추가하면 TPM 플러그인에 의해 덮어쓰여질 수 있음
run '~/.tmux/plugins/tpm/tpm'
